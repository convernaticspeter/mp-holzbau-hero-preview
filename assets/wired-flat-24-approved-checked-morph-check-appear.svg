<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Geprüft">
  <defs>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ring{fill:none;stroke:#d6a14d;stroke-width:5;stroke-linecap:round;stroke-dasharray:252;stroke-dashoffset:252;animation:ring 1.05s cubic-bezier(.22,.8,.2,1) forwards}
      .mark{fill:none;stroke:#fff7e8;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:76;stroke-dashoffset:76;filter:url(#glow);animation:check .95s cubic-bezier(.16,.9,.22,1) .9s forwards}
      .spark{fill:#d6a14d;opacity:0;transform-origin:48px 48px;animation:spark .9s ease-out 1.55s forwards}
      .dot{fill:#2f4c34;opacity:0;animation:dot .55s ease-out .35s forwards}
      @keyframes ring{to{stroke-dashoffset:0}}
      @keyframes check{to{stroke-dashoffset:0}}
      @keyframes spark{0%{opacity:0;transform:scale(.25) rotate(0)}35%{opacity:1}100%{opacity:0;transform:scale(1.15) rotate(16deg)}}
      @keyframes dot{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
    </style>
  </defs>
  <circle class="dot" cx="48" cy="48" r="32"/>
  <circle class="ring" cx="48" cy="48" r="40"/>
  <path class="mark" d="M27 50.5 41.2 64 70 32"/>
  <g class="spark">
    <circle cx="17" cy="30" r="3"/><circle cx="76" cy="20" r="2.8"/><circle cx="80" cy="72" r="3.2"/><circle cx="24" cy="76" r="2.4"/>
  </g>
</svg>
