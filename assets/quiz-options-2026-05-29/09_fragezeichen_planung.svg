<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Schön gestaltetes Fragezeichen auf Planungsunterlagen</title>
  <desc id="desc">Warmer Planungshintergrund mit Holzstruktur, Skizzenlinien und großem Fragezeichen für noch offene Carport-Planung.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="0.58" stop-color="#ead8bb"/>
      <stop offset="1" stop-color="#caa779"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b6a35"/>
      <stop offset="0.48" stop-color="#d6a14d"/>
      <stop offset="1" stop-color="#6e4523"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#090d09" flood-opacity="0.32"/>
    </filter>
    <pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M-10 18 C25 4 54 34 100 18M-12 46 C34 31 56 66 105 45M-9 76 C31 58 61 92 101 73" fill="none" stroke="#6e4523" stroke-width="2" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="900" height="620" fill="url(#paper)"/>
  <rect width="900" height="620" fill="url(#grain)" opacity="0.55"/>
  <g opacity="0.33" stroke="#172419" stroke-width="3" fill="none">
    <path d="M105 466h520M105 516h360M112 122h250M112 160h190"/>
    <path d="M600 108l132 54v188H468V162z"/>
    <path d="M468 162l132-54 132 54M520 350V204h160v146M560 350V240h80v110"/>
    <circle cx="704" cy="458" r="36"/>
    <path d="M668 458h72M704 422v72"/>
  </g>
  <g transform="translate(168 94) rotate(-4)" filter="url(#shadow)">
    <rect x="0" y="0" width="350" height="430" rx="26" fill="#fffaf1" stroke="#172419" stroke-opacity="0.16" stroke-width="3"/>
    <path d="M45 94h260M45 143h222M45 344h170" stroke="#172419" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
    <path d="M80 242c0-70 54-118 127-118 69 0 119 41 119 101 0 50-29 78-69 104-28 18-40 32-42 62" fill="none" stroke="url(#wood)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="208" cy="386" r="29" fill="url(#wood)"/>
  </g>
  <g opacity="0.9">
    <rect x="594" y="404" width="190" height="42" rx="21" fill="#172419" opacity="0.88"/>
    <text x="689" y="431" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#fff7e8">noch offen</text>
  </g>
